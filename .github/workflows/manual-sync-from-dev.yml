name: Manual Sync from safubuki/turtle-video

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # 実際の同期元。ここは upstream 情報なので書き換えない。
      SOURCE_REPO: https://github.com/safubuki/turtle-video.git
      SOURCE_REF: main
      SOURCE_REPO_OWNER: safubuki
      SOURCE_REPO_NAME: turtle-video
      # sync 後に戻す Playground 固有の値。
      TARGET_APP_TITLE: タートルビデオ Playground
      TARGET_LOCAL_REPO_PATH: C:\git_home\turtle-video-playground
    steps:
      # push するので履歴付きで checkout する。
      - name: 対象リポジトリを checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 同期元は毎回クリーンに shallow clone する。
      - name: 同期元リポジトリを clone
        run: |
          # 前回の一時 clone が残っていても確実に消す。
          rm -rf ../source-repo
          # 履歴は不要なので depth=1 で十分。
          git clone --depth=1 --branch "$SOURCE_REF" "$SOURCE_REPO" ../source-repo

      # git 履歴は混ぜず、ファイル内容だけを mirror する。
      - name: 同期元ファイルを mirror
        run: |
          # この workflow 自身は --delete で消さない。
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github/workflows/manual-sync-from-dev.yml' \
            ../source-repo/ ./

      # rsync で上書きされた Playground 固有差分をここで戻す。
      - name: Playground 固有差分を再適用
        env:
          TARGET_REPO_OWNER: ${{ github.repository_owner }}
          TARGET_REPO_NAME: ${{ github.event.repository.name }}
        run: |
          # package metadata / README / Docs を repo 固有値へ戻す。
          node scripts/apply-playground-sync-overrides.mjs

      # 差分があるときだけ同期コミットを作る。
      - name: 差分があるときだけコミット
        run: |
          git config user.name "sync-bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          # commit message の turtle-video は実際の同期元を示すので維持する。
          git commit -m "chore(sync): sync from safubuki/turtle-video ($(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M:%S %Z'))"

      # 生成した同期コミットを origin へ反映する。
      - name: 変更を push
        run: git push

      # 同期完了後に公開用 deploy を起動する。
      - name: deploy workflow を起動
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });
